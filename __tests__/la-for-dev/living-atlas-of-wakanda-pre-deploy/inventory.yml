all:
  vars:
    # previously ubuntu without quotes:
    def_ansible_user: 'ubuntu'
    sudo_defaults:
      - name: 'ubuntu'
        # https://docs.ansible.com/ansible/2.3/intro_configuration.html#pipelining
        defaults: '!requiretty'
    sudo_users:
      - name: 'ubuntu'
        nopasswd: yes
    ssh_keys: [  ]
    ansible_python_interpreter: /usr/bin/python3
