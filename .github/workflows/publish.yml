name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install -g npm@latest

      - run: npm ci

      - run: |
          echo "registry=https://registry.npmjs.org/" > ~/.npmrc
          npm publish
