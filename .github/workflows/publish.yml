name: Publish to npm

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm publish
        id: publish
        continue-on-error: true

      - name: Show publish output
        if: steps.publish.outcome == 'failure'
        run: echo "Publish failed, checking for OIDC or npm error"
